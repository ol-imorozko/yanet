steps:
- ipv4Update: "0.0.0.0/0 -> 10.0.0.2"

- sendPackets:
  - port: kni0
    send: 001-send.pcap
    expect: 001-expect.pcap

- dumpPackets:
  - ringTag: shm_2_0
    expect: 001-expect-dump.pcap

- cli: show shm info

- cli_check: |
    tcpdump ring1 | tcpdump -t -r -
